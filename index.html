<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Game Remedial · Perdagangan Internasional</title>
    <!-- Font & style dasar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a3a4b 0%, #235b6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 30px 40px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        /* HEADER */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 30, 40, 0.7);
            padding: 14px 24px;
            border-radius: 100px;
            margin-bottom: 28px;
            color: white;
            border: 1px solid rgba(255, 215, 100, 0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        .score-box {
            background: #0f2c38;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.5rem;
            color: #f1c40f;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 0 0 1px #f1c40f55;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-box span {
            background: #1e4a5a;
            padding: 0 12px;
            border-radius: 40px;
            color: white;
        }

        /* Kartu pertanyaan */
        .question-card {
            background: #fef9f0;
            border-radius: 50px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 15px 0 #0b2a33, inset 0 -6px 0 #c0a88a;
            margin-bottom: 30px;
            border: 2px solid #e5d4b0;
        }

        .question-text {
            font-size: 1.9rem;
            font-weight: 700;
            color: #1e3d47;
            line-height: 1.3;
            margin-bottom: 15px;
            min-height: 4.5rem;
            word-break: break-word;
        }

        .question-category {
            display: inline-block;
            background: #2f6b7a;
            padding: 6px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: inset 0 -3px 0 #12353f;
        }

        /* Pilihan jawaban */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #f5efe6;
            border: 3px solid #b9a78b;
            border-radius: 50px;
            padding: 18px 8px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d3a44;
            cursor: pointer;
            transition: 0.15s ease;
            box-shadow: 0 8px 0 #8f7c64, 0 5px 12px rgba(0,0,0,0.2);
            letter-spacing: 0.3px;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(0.97);
            background: #fff7ec;
            border-color: #d4b48c;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #7b6a53;
        }

        .option-btn.correct {
            background: #9bdd9b;
            border-color: #2c7a2c;
            box-shadow: 0 6px 0 #1f5a1f;
            color: #0a3b0a;
            pointer-events: none;
        }

        .option-btn.wrong {
            background: #f3a8a8;
            border-color: #a14545;
            box-shadow: 0 6px 0 #732f2f;
            color: #4f1e1e;
            pointer-events: none;
        }

        .option-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            filter: grayscale(0.3);
        }

        /* Tombol next & feedback */
        .action-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
        }

        .feedback-message {
            background: #0a2a33d9;
            padding: 12px 20px;
            border-radius: 50px;
            color: #f5e7d3;
            font-weight: 600;
            flex: 1;
            min-width: 150px;
            border-left: 6px solid #f1c40f;
            backdrop-filter: blur(4px);
            font-size: 1rem;
        }

        .btn-next {
            background: #f7c948;
            border: none;
            border-radius: 60px;
            padding: 14px 32px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #1e3a44;
            box-shadow: 0 8px 0 #b28a2c, 0 6px 14px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.08s linear;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 2px solid #fade7a;
            letter-spacing: 1px;
        }

        .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9f7825;
        }

        .btn-next:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9f7825;
            pointer-events: none;
        }

        /* Reset / progress */
        .progress-indicator {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            color: #d4dce0;
            font-weight: 600;
            background: #0d2933b8;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid #b6b08b55;
        }

        .restart-btn {
            background: #3f6d7a;
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.1s ease;
            border: 1px solid #9fc7d4;
            box-shadow: 0 4px 0 #1a3b44;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a3b44;
        }

        /* Animasi */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: pop 0.25s ease-out;
        }

        /* Responsive */
        @media (max-width: 580px) {
            .game-container { padding: 20px 16px; }
            .question-text { font-size: 1.5rem; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .game-header h1 { font-size: 1.3rem; }
            .score-box { font-size: 1.2rem; padding: 6px 16px; }
            .btn-next { padding: 12px 20px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- HEADER -->
        <div class="game-header">
            <h1>🌍 REMEDIAL EKONOMI</h1>
            <div class="score-box">
                🏆 <span id="scoreDisplay">0</span>
            </div>
        </div>

        <!-- CARD PERTANYAAN -->
        <div class="question-card" id="questionCard">
            <div class="question-text" id="questionText">Loading soal ...</div>
            <div class="question-category" id="categoryTag">🌐 Perdagangan Internasional</div>
        </div>

        <!-- OPSI JAWABAN -->
        <div class="options-grid" id="optionsContainer">
            <button class="option-btn" data-index="0">A.</button>
            <button class="option-btn" data-index="1">B.</button>
            <button class="option-btn" data-index="2">C.</button>
            <button class="option-btn" data-index="3">D.</button>
        </div>

        <!-- ACTION + FEEDBACK -->
        <div class="action-area">
            <div class="feedback-message" id="feedbackMsg">💡 Pilih salah satu jawaban!</div>
            <button class="btn-next" id="nextBtn">➡️ LANJUT</button>
        </div>

        <!-- PROGRESS & RESET -->
        <div class="progress-indicator">
            <span id="progressText">Soal 1 / 10</span>
            <button class="restart-btn" id="restartBtn">🔄 Ulangi Game</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DATA SOAL (Perdagangan Internasional) ----------
            const questions = [
                {
                    question: "Apa yang dimaksud dengan perdagangan internasional?",
                    options: [
                        "Jual beli barang antar negara",
                        "Jual beli dalam satu provinsi",
                        "Ekspor impor hanya jasa",
                        "Perdagangan antar pulau"
                    ],
                    correct: 0
                },
                {
                    question: "Negara yang menerapkan kebijakan proteksi perdagangan bertujuan untuk …",
                    options: [
                        "Melindungi industri dalam negeri",
                        "Mendorong impor barang murah",
                        "Menghapus semua tarif",
                        "Meningkatkan ketergantungan luar negeri"
                    ],
                    correct: 0
                },
                {
                    question: "Contoh konflik dagang internasional yang terjadi antara AS dan China adalah …",
                    options: [
                        "Perang tarif dan pembatasan ekspor",
                        "Perang nuklir",
                        "Konflik wilayah laut",
                        "Boikot Olimpiade"
                    ],
                    correct: 0
                },
                {
                    question: "WTO adalah organisasi yang mengatur …",
                    options: [
                        "Perdagangan global antar negara",
                        "Kesehatan dunia",
                        "Hak asasi manusia",
                        "Keuangan mikro"
                    ],
                    correct: 0
                },
                {
                    question: "Kebijakan kuota impor membatasi …",
                    options: [
                        "Jumlah barang yang boleh masuk",
                        "Harga barang impor",
                        "Kualitas barang ekspor",
                        "Jumlah uang beredar"
                    ],
                    correct: 0
                },
                {
                    question: "Dampak negatif dari perdagangan internasional adalah …",
                    options: [
                        "Ketergantungan ekonomi",
                        "Peningkatan devisa negara",
                        "Transfer teknologi",
                        "Efisiensi produksi"
                    ],
                    correct: 0
                },
                {
                    question: "Yang termasuk hambatan tarif dalam perdagangan internasional adalah …",
                    options: [
                        "Bea masuk / pajak impor",
                        "Larangan impor",
                        "Kuota",
                        "Embargo"
                    ],
                    correct: 0
                },
                {
                    question: "Teori keunggulan komparatif dikemukakan oleh …",
                    options: [
                        "David Ricardo",
                        "Adam Smith",
                        "John Maynard Keynes",
                        "Karl Marx"
                    ],
                    correct: 0
                },
                {
                    question: "Salah satu penyebab konflik dagang adalah …",
                    options: [
                        "Perbedaan kebijakan subsidi",
                        "Kesamaan mata uang",
                        "Integrasi ekonomi",
                        "Penurunan tarif"
                    ],
                    correct: 0
                },
                {
                    question: "Apa tujuan utama dari perdagangan internasional?",
                    options: [
                        "Memenuhi kebutuhan dalam negeri & keuntungan",
                        "Menciptakan perang",
                        "Menghilangkan budaya lokal",
                        "Menghentikan globalisasi"
                    ],
                    correct: 0
                }
            ];

            // ---------- STATE ----------
            let currentQuestionIndex = 0;
            let score = 0;
            let isAnswered = false;
            let totalQuestions = questions.length;

            // DOM elements
            const questionText = document.getElementById('questionText');
            const categoryTag = document.getElementById('categoryTag');
            const optionsBtns = document.querySelectorAll('.option-btn');
            const feedbackMsg = document.getElementById('feedbackMsg');
            const nextBtn = document.getElementById('nextBtn');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const progressText = document.getElementById('progressText');
            const restartBtn = document.getElementById('restartBtn');

            // ---------- FUNGSI UTAMA ----------
            function loadQuestion(index) {
                // Reset state jawaban
                isAnswered = false;
                const q = questions[index];
                if (!q) return;

                // set pertanyaan & kategori
                questionText.textContent = q.question;
                categoryTag.textContent = `🌐 Perdagangan Internasional`;

                // set opsi
                optionsBtns.forEach((btn, i) => {
                    btn.textContent = q.options[i] || '---';
                    btn.className = 'option-btn'; // reset class
                    btn.disabled = false;
                });

                // feedback default
                feedbackMsg.innerHTML = '💡 Pilih salah satu jawaban!';
                // disable next button sampai terjawab
                nextBtn.disabled = true;

                // update progress
                progressText.textContent = `Soal ${index+1} / ${totalQuestions}`;
            }

            // Handle jawaban diklik
            function handleOptionClick(e) {
                const btn = e.currentTarget;
                if (isAnswered || btn.disabled) return;

                const selectedIndex = parseInt(btn.dataset.index, 10);
                const q = questions[currentQuestionIndex];
                const isCorrect = (selectedIndex === q.correct);

                // Tandai jawaban
                optionsBtns.forEach((b, i) => {
                    b.disabled = true;
                    if (i === q.correct) {
                        b.classList.add('correct');
                    } else if (i === selectedIndex && !isCorrect) {
                        b.classList.add('wrong');
                    }
                });

                // Update score & feedback
                if (isCorrect) {
                    score += 1;
                    feedbackMsg.innerHTML = '✅ Benar! +1 poin';
                } else {
                    feedbackMsg.innerHTML = `❌ Salah. Jawaban benar: ${q.options[q.correct]}`;
                }

                // update score display
                scoreDisplay.textContent = score;
                isAnswered = true;
                nextBtn.disabled = false;
            }

            // Pindah ke soal berikutnya / selesai
            function goToNext() {
                if (!isAnswered) return;

                if (currentQuestionIndex + 1 < totalQuestions) {
                    currentQuestionIndex++;
                    loadQuestion(currentQuestionIndex);
                } else {
                    // Game selesai
                    feedbackMsg.innerHTML = `🏁 Selesai! Skor akhir: ${score} / ${totalQuestions}`;
                    nextBtn.disabled = true;
                    optionsBtns.forEach(b => b.disabled = true);
                    progressText.textContent = `✅ Selesai!`;
                    // tampilkan pesan khusus untuk nilai 28? (cocok)
                    if (score <= 3) {
                        feedbackMsg.innerHTML = `📘 Nilai kamu 28? Tetap semangat! Kamu bisa lebih baik dengan belajar.`;
                    } else {
                        feedbackMsg.innerHTML = `🎉 Skor akhir: ${score} / ${totalQuestions}. Terus belajar!`;
                    }
                }
            }

            // Reset game
            function resetGame() {
                currentQuestionIndex = 0;
                score = 0;
                isAnswered = false;
                scoreDisplay.textContent = '0';
                loadQuestion(0);
                feedbackMsg.innerHTML = '🔄 Game diulang. Selamat bermain!';
                nextBtn.disabled = true;
                optionsBtns.forEach(b => {
                    b.className = 'option-btn';
                    b.disabled = false;
                });
            }

            // ---------- EVENT LISTENERS ----------
            optionsBtns.forEach(btn => {
                btn.addEventListener('click', handleOptionClick);
            });

            nextBtn.addEventListener('click', goToNext);

            restartBtn.addEventListener('click', resetGame);

            // ---------- INIT GAME ----------
            loadQuestion(0);
            scoreDisplay.textContent = '0';
            nextBtn.disabled = true; // belum jawab

            // pesan awal
            feedbackMsg.innerHTML = '💡 Pilih jawaban, lalu tekan LANJUT.';
        })();
    </script>
</body>
</html>
